id: doxorubicin
name: Doxorubicin
toxin_class: multi_mechanism
description: >
  Anthracycline chemotherapeutic acting through two mechanisms: redox cycling
  (ROS generation) and DNA intercalation / topoisomerase II poisoning.
  Its ROS mechanism underlies dose-limiting cardiotoxicity.
requires_bioactivation: false
targets:
  - {node: ros_source, effect: produce, ic50: 2.0, hill: 1.3, emax: 1.0}
  - {node: dna,        effect: damage,  ic50: 3.0, hill: 1.3, emax: 1.0}

id: carbon_tetrachloride
name: Carbon tetrachloride (CCl4)
toxin_class: metabolism_dependent
description: >
  Prototypical CYP-bioactivated hepatotoxin. CYP2E1 converts it to the
  trichloromethyl radical, which triggers lipid peroxidation and membrane
  damage. Toxicity is metabolism-gated (requires CYP).
requires_bioactivation: true
targets:
  - {node: ros_source,      effect: produce, ic50: 5000.0, hill: 2.0, emax: 1.0}
  - {node: plasma_membrane, effect: damage,  ic50: 8000.0, hill: 2.0, emax: 1.0}
